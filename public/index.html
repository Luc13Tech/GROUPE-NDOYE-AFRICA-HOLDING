  <title>Groupe Ndoye Africa Holding — Bâtir l'Afrique de demain</title>

  <style>
    /* Critical CSS - prevent FOUC */
    html, body { margin: 0; padding: 0; background: #050810; }
    #root { min-height: 100vh; }
    /* Loading screen */
    .gnah-splash {
      position: fixed; inset: 0; background: #050810;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999; transition: opacity .6s ease;
    }
    .gnah-splash.hide { opacity: 0; pointer-events: none; }
    .gnah-splash-logo {
      font-family: Georgia, serif; color: #c9a84c;
      font-size: clamp(1.2rem,4vw,1.8rem); letter-spacing: .3em;
      animation: splashPulse 1.5s ease-in-out infinite alternate;
    }
    .gnah-splash-sub {
      font-family: Georgia, serif; font-style: italic;
      color: rgba(201,168,76,.45); font-size: clamp(.7rem,2vw,.85rem);
      letter-spacing: .15em; margin-top: 8px;
    }
    .gnah-splash-bar {
      width: 160px; height: 2px; background: rgba(201,168,76,.15);
      margin-top: 24px; border-radius: 1px; overflow: hidden;
    }
    .gnah-splash-bar-fill {
      height: 100%; background: linear-gradient(90deg,#c9a84c,#e8c96a);
      animation: splashLoad 1.8s ease-out forwards;
    }
    @keyframes splashPulse { from{opacity:.6} to{opacity:1} }
    @keyframes splashLoad { from{width:0} to{width:100%} }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div class="gnah-splash" id="splash">
    <div class="gnah-splash-logo">G.N.A.H.</div>
    <div class="gnah-splash-sub">Groupe Ndoye Africa Holding</div>
    <div class="gnah-splash-bar">
      <div class="gnah-splash-bar-fill"></div>
    </div>
  </div>

  <noscript>
    <div style="font-family:Georgia,serif;text-align:center;padding:60px 20px;background:#050810;color:#c9a84c;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column">
      <div style="font-size:1.4rem;letter-spacing:.2em;margin-bottom:8px">G.N.A.H.</div>
      <div style="font-size:.9rem;color:rgba(201,168,76,.6)">Veuillez activer JavaScript pour accéder à la plateforme.</div>
    </div>
  </noscript>

  <div id="root"></div>

  <!-- Register Service Worker -->
  <script>
    // Hide splash screen when React loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function() { splash.remove(); }, 700);
        }
      }, 1800);
    });

    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(reg) {
            // Check for updates every 60 seconds
            setInterval(function() { reg.update(); }, 60000);
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available - reload to update
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                  window.location.reload();
                }
              });
            });
          })
          .catch(function() {});
      });
    }
  </script>
</body>
</html>
